<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Labareda Hub</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- SUPABASE (CARREGA ANTES DO SCRIPT) -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: #fff;
      margin: 0;
      padding: 20px;
    }

    .card {
      background: #1e293b;
      padding: 20px;
      border-radius: 10px;
      max-width: 500px;
      margin: auto;
    }

    input, button {
      width: 100%;
      padding: 10px;
      margin-top: 10px;
      border-radius: 6px;
      border: none;
    }

    button {
      background: #22c55e;
      color: #000;
      font-weight: bold;
      cursor: pointer;
    }
  </style>
</head>

<body>

  <div class="card">
    <h2>Teste de Lead</h2>

    <form id="lead-form">
      <input type="text" id="nome" placeholder="Seu nome" required>
      <input type="email" id="email" placeholder="Seu email" required>
      <button type="submit">Enviar</button>
    </form>
  </div>

  <script>
    /* ============================================================
       CONFIG SUPABASE (CORRETO)
       ============================================================ */

    const SUPABASE_URL = 'https://gdhnjgdnwbuntonapxgz.supabase.co';
    const SUPABASE_KEY = 'COLE_SUA_ANON_KEY_AQUI';

    const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    /* ============================================================
       ENVIO DE FORMULÁRIO
       ============================================================ */

    const form = document.getElementById('lead-form');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();

      const nome = document.getElementById('nome').value;
      const email = document.getElementById('email').value;

      const { error } = await sb
        .from('leads')
        .insert([{ nome, email }]);

      if (error) {
        alert('Erro ao enviar');
        console.error(error);
      } else {
        alert('Enviado com sucesso!');
        form.reset();
      }
    });
  </script>

</body>
</html>
